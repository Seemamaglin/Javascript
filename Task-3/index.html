<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="lightbox" id="lightbox">
        <span class="close-btn" id="closeBtn">&times;</span>
        <img id="lightboxImg">
    </div>

    <div class="gallery">
        <img src="images/img1.jfif" class="gallery-img">
        <img src="images/img2.jfif" class="gallery-img">
        <img src="images/img3.jfif" class="gallery-img">
        <img src="images/img4.jfif" class="gallery-img">
        <img src="images/img5.jfif" class="gallery-img">
        <img src="images/img6.jfif" class="gallery-img">
        <img src="images/img7.jfif" class="gallery-img">
        <img src="images/img8.jfif" class="gallery-img">
    </div>

    <script>
        let lightbox=document.getElementById("lightbox");
        let lightboxImg=document.getElementById("lightboxImg");
        let thumbnails=document.querySelectorAll(".gallery-img");
        let closeBtn=document.getElementById("closeBtn");

        thumbnails.forEach(img =>{
            img.addEventListener('click',()=>{
                lightboxImg.src=img.src;
                lightbox.classList.add("active");
            })
        });

        closeBtn.addEventListener('click',()=>{
            lightbox.classList.remove('active');
        });
    </script>
</body>
</html>
